<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnibus Rhetoric Flashcards</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 750px;
            text-align: center;
            position: relative;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls select, .controls button {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
            transition: background 0.3s ease, opacity 0.3s ease;
        }

        .controls select option { background: #2b2b2b; color: white; }
        .controls select:hover:not(:disabled), .controls button:hover:not(:disabled) { background: rgba(0, 0, 0, 0.4); }
        .controls button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-danger { background: rgba(255, 50, 50, 0.2) !important; }
        .btn-danger:hover:not(:disabled) { background: rgba(255, 50, 50, 0.4) !important; }

        .btn-success { background: rgba(46, 204, 113, 0.2) !important; }
        .btn-success:hover:not(:disabled) { background: rgba(46, 204, 113, 0.4) !important; }

        .btn-info { background: rgba(52, 152, 219, 0.2) !important; }
        .btn-info:hover:not(:disabled) { background: rgba(52, 152, 219, 0.4) !important; }

        /* Tabs System */
        .tabs {
            display: flex;
            width: 100%;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.3s ease, font-weight 0.3s ease;
            min-width: 100px;
        }

        .tab.active {
            background: rgba(255,255,255,0.25);
            font-weight: bold;
            box-shadow: inset 0 -3px 0 rgba(255,255,255,0.5);
        }

        .tab:hover:not(.active) { background: rgba(255,255,255,0.1); }

        /* Views */
        #card-view { display: flex; flex-direction: column; width: 100%; }

        #stats-view, #list-view {
            display: none;
            flex-direction: column;
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        /* Scrollbar styling */
        #stats-view::-webkit-scrollbar, #list-view::-webkit-scrollbar { width: 8px; }
        #stats-view::-webkit-scrollbar-track, #list-view::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        #stats-view::-webkit-scrollbar-thumb, #list-view::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

        /* Dictionary List View */
        #list-view { gap: 15px; }
        
        .list-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .list-term { font-size: 18px; font-weight: bold; color: #a8ffb2; margin-bottom: 5px; }
        .list-lesson { font-size: 13px; color: #ffd166; font-weight: normal; margin-left: 8px; }
        .list-def { font-size: 15px; margin-bottom: 10px; line-height: 1.4; }
        .list-ex { font-size: 13px; color: rgba(255,255,255,0.7); font-style: italic; border-left: 2px solid rgba(255,255,255,0.3); padding-left: 10px; }

        /* History Table */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 8px 10px; border-bottom: 1px solid var(--glass-border); }
        th { background: rgba(0,0,0,0.2); position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 10; }
        .correct-col { color: #a8ffb2; text-align: center; }
        .wrong-col { color: #ffb2b2; text-align: center; }
        .table-section-border { border-left: 1px solid var(--glass-border); }

        /* Card Flip Animation */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 260px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            font-size: 24px;
            line-height: 1.4;
            cursor: pointer;
        }

        .card-back { transform: rotateY(180deg); font-size: 18px; }

        .mastery-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            background: rgba(46, 204, 113, 0.4);
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid rgba(46, 204, 113, 0.6);
            display: none;
        }

        .card-lesson-tag {
            font-size: 14px;
            color: #ffd166;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-history-stats {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        .stat-label { color: rgba(255, 255, 255, 0.6); }
        .stat-c { color: #a8ffb2; font-weight: bold; }
        .stat-w { color: #ffb2b2; font-weight: bold; }

        /* Test Mode UI */
        #test-controls { display: none; width: 100%; }

        #test-input {
            width: calc(100% - 30px);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
        }
        
        #test-input:disabled { opacity: 0.5; }

        #test-feedback {
            font-weight: bold;
            min-height: 20px;
            margin-bottom: 5px;
        }
        
        #test-hint {
            color: #ffd166;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 15px;
            font-style: italic;
        }

        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: rgba(255,255,255,0.8);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.8);
        }

        .stats-highlight { color: #a8ffb2; font-weight: bold; }

        #learn-controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        #learn-controls button {
            flex: 1;
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
        }

        #file-import { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <header>
            <h2 style="margin: 0; font-size: 22px;">Rhetoric Review</h2>
            <div class="controls">
                <select id="direction-select" onchange="changeDirection()">
                    <option value="mixed" selected>Mixed (Auto)</option>
                    <option value="term-def">Term → Def</option>
                    <option value="def-term">Def → Term</option>
                </select>
                <button onclick="resetSession()">Restart</button>
                <button class="btn-info" onclick="exportData()">Export</button>
                <button class="btn-info" onclick="triggerImport()">Import</button>
                <button class="btn-danger" onclick="wipeData()">Wipe</button>
            </div>
            <input type="file" id="file-import" accept=".json" onchange="handleImport(event)">
        </header>

        <div class="tabs">
            <div class="tab active" id="tab-learn" onclick="switchTab('learn')">Learn (Cards)</div>
            <div class="tab" id="tab-test" onclick="switchTab('test')">Test (Typing)</div>
            <div class="tab" id="tab-stats" onclick="switchTab('stats')">Stats</div>
            <div class="tab" id="tab-list" onclick="switchTab('list')">List (All)</div>
        </div>

        <div id="card-view">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="stats-row">
                <span id="progress-text">Card 1 of X</span>
                <span id="mastery-text">Mastered: <span class="stats-highlight">0</span></span>
            </div>

            <div class="card-container" id="card-container" onclick="flipCard()">
                <div class="card" id="flashcard">
                    <div class="card-face card-front">
                        <div class="mastery-badge">⭐ Mastered</div>
                        <div class="card-lesson-tag" id="card-front-lesson"></div>
                        <span id="card-front-text" style="width: 100%; text-align: center;">Front</span>
                        
                        <div class="card-history-stats" id="card-front-stats"></div>
                        <div id="flip-hint" style="position: absolute; top: 10px; left: 15px; font-size: 12px; color: rgba(255,255,255,0.5);">Click to flip</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="mastery-badge">⭐ Mastered</div>
                        <div class="card-lesson-tag" id="card-back-lesson"></div>
                        <span id="card-back-text" style="width: 100%; text-align: center;">Back</span>
                        <div class="card-history-stats" id="card-back-stats"></div>
                    </div>
                </div>
            </div>

            <div id="learn-controls" class="controls">
                <button class="button" onclick="skipCard()">Skip</button>
                <button class="button btn-danger" onclick="markWrong()">Wrong</button>
                <button class="button btn-success" onclick="markCorrect()">Correct</button>
            </div>

            <div id="test-controls">
                <input type="text" id="test-input" placeholder="Type your answer here..." autocomplete="off" onkeypress="handleEnter(event)">
                <div id="test-feedback"></div>
                <div id="test-hint"></div>
                
                <div class="controls" style="display: flex; gap: 10px; width: 100%;">
                    <button id="btn-hint" class="button" onclick="showHint()" style="flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.1);">Hint</button>
                    <button id="btn-submit" class="button btn-success" onclick="checkAnswer()" style="flex: 2; padding: 12px;">Submit Answer</button>
                    <button id="btn-giveup" class="button btn-danger" onclick="giveUp()" style="flex: 1; padding: 12px;">Give Up</button>
                </div>
            </div>
        </div>

        <div id="stats-view">
            <table>
                <thead>
                    <tr>
                        <th rowspan="2" style="vertical-align: bottom; text-align: left;">Term</th>
                        <th colspan="2" class="table-section-border" style="text-align: center;">Learn Mode</th>
                        <th colspan="2" class="table-section-border" style="text-align: center;">Test Mode</th>
                        <th rowspan="2" class="table-section-border" style="vertical-align: bottom; text-align: center;">Total<br>Accuracy</th>
                    </tr>
                    <tr>
                        <th class="correct-col table-section-border" style="font-size: 11px; top: 38px;">Correct</th>
                        <th class="wrong-col" style="font-size: 11px; top: 38px;">Wrong</th>
                        <th class="correct-col table-section-border" style="font-size: 11px; top: 38px;">Correct</th>
                        <th class="wrong-col" style="font-size: 11px; top: 38px;">Wrong</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    </tbody>
            </table>
        </div>

        <div id="list-view">
            </div>

    </div>
</div>

<script>
    // Complete Dataset with Terms, Definitions, Examples, and Lessons
    const flashcards = [
        { term: "Absolute ellipsis", def: "A phrase or sentence in which the omitted material is not betrayed by the words which remain.", example: "\"Et tu, Brute? ( Julius Caesar , Act III, Scene I, by Shakespeare)\"", lesson: "Lesson VI" },
        { term: "Anadiplosis", def: "Repetition of an end at the next beginning.", example: "\"And I will luve thee still, my dear, / Till a' the seas gang dry. / Till a' the seas gang dry, my dear, / And the rocks melt wi' the sun. (\"\"A Red, Red Rose\"\" by Robert Burns)\"", lesson: "Lesson XVI" },
        { term: "Anaphora", def: "Repetition at the beginning.", example: "\"I never saw a moor, / I never saw the sea; / Yet know I how the heather looks, / And what a wave must be. (\"\"I Never Saw a Moor\"\" by Emily Dickinson)\"", lesson: "Lesson XV" },
        { term: "Anapodoton", def: "The omission of one or more whole clauses which are not logically implied by the remaining text.", example: "As a matter of fact you needn't bother to ascertain. I ascertained. They're real. ( The Great Gatsby  by F. Scott Fitzgerald)", lesson: "Lesson VI" },
        { term: "Anastrophe", def: "The reversal of word order.", example: "\"And moving through a mirror clear / That hangs before her all the year, / Shadows of the world appear. / There she sees the highway near / Winding down to Camelot. (\"\"The Lady of Shalott\"\" by Alfred, Lord Tennyson)\"", lesson: "Lesson VII" },
        { term: "Antanaclasis", def: "Repetition in different senses.", example: "\"Let me give light, but let me not be light. ( The Merchant of Venice , Act V, Scene I, by Shakespeare)\"", lesson: "Lesson XIII" },
        { term: "Anthimeria", def: "The substitution of one part of speech for another.", example: "\"I would have such a fellow whipp'd for o'erdoing Termagant; it out-herods Herod. ( Hamlet , Act III, Scene II, by Shakespeare)\"", lesson: "Lesson IX" },
        { term: "Antiptosis", def: "The substitution of a prepositional phrase for an adjective.", example: "\"This fair is no new-erected business, but a thing of ancient standing. ( Pilgrim's Progress  by John Bunyan)\"", lesson: "Lesson IX" },
        { term: "Antisthecon", def: "The substitution of one or more letters in a word in an intentional misspelling.", example: "\"Oliver: Wilt thou lay hands on me, villain? / Orlando: I am no villein: I am the youngest son of Sir Roland de Boys. ( As You Like It , Act I, Scene I, by Shakespeare)\"", lesson: "Lesson IV" },
        { term: "Antithesis", def: "The repetition of ideas by negation.", example: "\"Again, as yesterday, suddenly, without the least transition, he felt himself thrown down from the height of happiness, peace, dignity, into an abyss of despair, anger and humiliation. ( Anna Karenina  by Leo Tolstoy)\"", lesson: "Lesson XII" },
        { term: "Aphaeresis", def: "The subtraction of letters from the beginning of a word in an intentional misspelling.", example: "\"Point against point rebellious, arm 'gainst arm, / Curbing his lavish spirit; and to conclude, / The victory fell on us. ( Macbeth , Act I, Scene II, by Shakespeare)\"", lesson: "Lesson IV" },
        { term: "Apocope", def: "Subtraction of letters from the end of a word in an intentional misspelling.", example: "\"Last night of all, / When yond same star that's westward from the pole / Had made his course t' illume that part of heaven. ( Hamlet , Act I, Scene I, by Shakespeare)\"", lesson: "Lesson IV" },
        { term: "Aporia", def: "To talk about not being able to talk about something.", example: "\"Not all the calculators of the National Debt can tell me the capacity for good or evil... for the decomposition of virtue into vice, or the reverse... ( Hard Times  by Charles Dickens)\"", lesson: "Lesson VI" },
        { term: "Aposiopesis", def: "The intentional omission of the last part of a sentence or the last part of a thought.", example: "\"\"\"Really, now you ask me,\"\" said Alice, very much confused, \"\"I don't think—\"\" \"\"Then you shouldn't talk,\"\" said the Hatter. ( Alice's Adventures in Wonderland  by Lewis Carroll)\"", lesson: "Lesson VI" },
        { term: "Asterismos", def: "The addition of a word to emphasize what follows.", example: "\"This the invisible police officer of the Fates, who has the constant surveillance of me, and secretly dogs me, and influences me in some unaccountable way—he can better answer than any one else. ( Moby Dick  by Herman Melville)\"", lesson: "Lesson XI" },
        { term: "Asyndeton", def: "An omission of a conjunction.", example: "\"Jane could not take her eyes from her mother's hands. They had a way of doing things, peeling apples, sprinkling salt, counting pennies, that fascinated her. ( The Moffats  by Eleanor Estes)\"", lesson: "Lesson I" },
        { term: "Auxesis", def: "Arrangement in ascending order.", example: "\"Now could thou and I rob the thieves and go merrily to London, it would be argument for a week, laughter for a month, and a good jest forever. ( Henry IV, Part 1 , Act II, Scene II, by Shakespeare)\"", lesson: "Lesson XVI" },
        { term: "Catachresis", def: "An apparently inappropriate substitution of one word for another.", example: "\"I have supp'd full with horrors. ( Macbeth , Act V, Scene V, by Shakespeare)\"", lesson: "Lesson X" },
        { term: "Chiasmus", def: "Epanodos at the level of the passage.", example: "\"There was an old owl, who lived in an oak; The more he heard, the less he spoke. / The less he spoke, the more he heard. / Why aren't we all like that wise old bird! (\"\"A Wise Old Owl,\"\" Traditional Nursery Rhyme)\"", lesson: "Lesson XVI" },
        { term: "Congeries", def: "Repetition using other words.", example: "\"Why did I not die? More miserable than man ever was before, why did I not sink into forgetfulness and rest? ( Frankenstein  by Mary Shelley)\"", lesson: "Lesson XII" },
        { term: "Diacope", def: "Repetition with only a word or two between.", example: "\"TRUE!—nervous—very, very dreadfully nervous I had been and am; but why will you say that I am mad? (\"\"The Tell-Tale Heart\"\" by Edgar Allan Poe)\"", lesson: "Lesson XIV" },
        { term: "Ellipsis", def: "The general name for the omission of one or more words.", example: "For 'twas the self-same Power divine / Taught you to sing and me to shine. ( The Nightingale and the Glow-worm  by William Cowper)", lesson: "Lesson V" },
        { term: "Enallage", def: "An exchange of words or a substitution of one for another.", example: "Ain't he played me tricks enough like that for me to be looking out for him by this time? But old fools is the biggest fools there is. ( The Adventures of Tom Sawyer  by Mark Twain)", lesson: "Lesson IX" },
        { term: "Enthymeme", def: "An abbreviation of a syllogism, where one or more of the premises is missing.", example: "\"She was a large, impassive, heavy-featured woman with a stern, set expression of mouth... But her tell-tale eyes were red and glanced at me from between the swollen lids. ( The Hound of the Baskervilles  by Arthur Conan Doyle)\"", lesson: "Lesson VI" },
        { term: "Epanalepsis", def: "Repetition of the beginning at the end.", example: "\"Nothing will come of nothing. ( King Lear , Act I, Scene I, by Shakespeare)\"", lesson: "Lesson XV" },
        { term: "Epanodos", def: "Repetition in reverse order.", example: "\"If love be rough with you, be rough with love. ( Romeo and Juliet , Act I, Scene IV, by Shakespeare)\"", lesson: "Lesson XVI" },
        { term: "Epanorthosis", def: "Addition by correction.", example: "\"I still fall short of it through my own fault, and through not observing the admonitions of the gods, and, I may almost say, their direct instructions. ( Meditations  by Marcus Aurelius)\"", lesson: "Lesson XII" },
        { term: "Epenthesis", def: "The addition of letters in the middle of the word in a purposeful misspelling.", example: "\"\"\"Here's a rahm,\"\" he said, at last... \"\"It's weel eneugh tuh ate a few porridge in.\"\" ( Wuthering Heights  by Emily Brontë)\"", lesson: "Lesson" },
        { term: "Epistrophe", def: "Repetition at the end.", example: "\"Little lamb, who made thee? / Dost thou know who made thee? (\"\"The Lamb\"\" by William Blake)\"", lesson: "Lesson XV" },
        { term: "Epizeuxis", def: "Immediate repetition.", example: "\"But who comes here? / My father, poorly led? World, world, O world! ( King Lear , Act IV, Scene I, by Shakespeare)\"", lesson: "Lesson XIV" },
        { term: "Gradatio", def: "Repeated repetition of an end at the next beginning.", example: "\"O, Topsy, poor child, I love you! ... I love you, because you haven't had any father, or mother, or friends;—because you've been a poor, abused child! ( Uncle Tom's Cabin  by Harriet Beecher Stowe)\"", lesson: "Lesson XVI" },
        { term: "Hendiadys", def: "Two or more words used, but one meaning intended.", example: "\"Go, soar with Plato to th' empyreal sphere, / To the first good, first perfect, and first fair. (\"\"An Essay on Man\"\" by Alexander Pope)\"", lesson: "Lesson II" },
        { term: "Hypallage", def: "A reversal which seems to change the sense of a sentence.", example: "\"And our hearts, though stout and brave, / Still, like muffled drums, are beating / Funeral marches to the grave. (\"\"A Psalm of Life\"\" by Henry Wadsworth Longfellow)\"", lesson: "Lesson VIII" },
        { term: "Hyperbaton", def: "The deviation from ordinary word order.", example: "\"Heaven and earth help him who plants a tree, / And his work its own reward shall be. (\"\"Plant a Tree\"\" by Lucy Larcom)\"", lesson: "Lesson VII" },
        { term: "Hysteron-proteron", def: "The reversal of temporal order in a sentence.", example: "Let us die. Let us rush into the thick of the fighting. ( The Aeneid  by Virgil)", lesson: "Lesson VIII" },
        { term: "Inclusio", def: "Repetition of the beginning.", example: "\"What is the matter with Mary Jane? / She's crying with all her might and main, / And she won't eat her dinner—rice pudding again— / What is the matter with Mary Jane? (\"\"Rice Pudding\"\" by A. A. Milne)\"", lesson: "Lesson XVI" },
        { term: "Isocolon", def: "The repetition of grammatical forms.", example: "\"And this our life exempt from public haunt / Finds tongues in trees, books in the running brooks, / Sermons in stones, and good in everything. ( As You Like It , Act II, Scene I, by Shakespeare)\"", lesson: "Lesson XIII" },
        { term: "Metalepsis", def: "The double substitution of a word for a related word.", example: "\"Was this the face that launched a thousand ships, / And burnt the topless towers of Ilium? ( Doctor Faustus  by Christopher Marlowe)\"", lesson: "Lesson X" },
        { term: "Metaplasmus", def: "A purposeful misspelling.", example: "(General term for intentional spelling variations)", lesson: "Lesson" },
        { term: "Metathesis", def: "The rearrangement of one or more letters in a word in an intentional misspelling.", example: "\"Tell us some moral thing, that we may lere / Some wit, and then will we gladly hear. ( The Canterbury Tales  by Geoffrey Chaucer)\"", lesson: "Lesson IV" },
        { term: "Metonymy", def: "The substitution of one word for another related word.", example: "\"I sing of arms and of the man, fated to be an exile. ( The Aeneid  by Virgil)\"", lesson: "Lesson IX" },
        { term: "Paradiastole", def: "The repetition of the disjunctives, \"neither\" and \"nor\" or \"either\" and \"or\".", example: "\"For the world, which seems / To lie before us like a land of dreams... Hath really neither joy, nor love, nor light, / Nor certitude, nor peace, nor help for pain. (\"\"Dover Beach\"\" by Matthew Arnold)\"", lesson: "Lesson II" },
        { term: "Parenthesis", def: "Parenthetical addition by way of explanation.", example: "\"This is a story of how a Baggins had an adventure, and found himself doing and saying things altogether unexpected. ( The Hobbit  by J. R. R. Tolkien)\"", lesson: "Lesson VIII" },
        { term: "Periphrasis", def: "The substitution of more for fewer words.", example: "\"Euphorbus was drawing back, and Menelaus struck him about the roots of his throat... the point went clean through his neck. ( The Iliad  by Homer)\"", lesson: "Lesson XI" },
        { term: "Pleonasm", def: "The addition of superfluous words.", example: "\"I saw the wound, I saw it with mine eyes. ( Romeo and Juliet , Act III, Scene II, by Shakespeare)\"", lesson: "Lesson XI" },
        { term: "Ploce", def: "Repetition in a general and restricted sense.", example: "The world of books is still the world. ( Aurora Leigh  by Elizabeth Barrett Browning)", lesson: "Lesson XIII" },
        { term: "Polyptoton", def: "The repetition of the same word or root in different grammatical forms.", example: "\"One short sleep past, we wake eternally / And death shall be no more; Death, thou shalt die. (\"\"Death Be Not Proud\"\" by John Donne)\"", lesson: "Lesson XIII" },
        { term: "Polysyndeton", def: "The repetition of the word \"and\" at the beginning of successive phrases.", example: "\"Near them, on the sand, / Half sunk, a shattered visage lies, whose frown, / And wrinkled lip, and sneer of cold command... (\"\"Ozymandias\"\" by Percy Bysshe Shelley)\"", lesson: "Lesson I" },
        { term: "Praecisio", def: "Simple silence.", example: "(The act of breaking off mid-speech)", lesson: "Lesson VI" },
        { term: "Proparalepsis", def: "The addition of letters to the end of a word in a purposeful misspelling.", example: "\"The fates / And prologue to the omen coming on, / Have heaven and earth together demonstrated / Unto our climatures and countrymen. ( Hamlet , Act I, Scene I, by Shakespeare)\"", lesson: "Lesson" },
        { term: "Prosthesis", def: "The addition of letters at the beginning of a word in a purposeful misspelling.", example: "\"O what a world is this when what is comely / Envenoms him that bears it! ( As You Like It , Act II, Scene III, by Shakespeare)\"", lesson: "Lesson" },
        { term: "Repetitio", def: "Irregular repetition of a word or phrase.", example: "\"A stony business altogether, with heavy stone balustrades, and stone urns, and stone flowers... ( A Tale of Two Cities  by Charles Dickens)\"", lesson: "Lesson XIV" },
        { term: "Scesis onomaton", def: "The intentional omission of a verb.", example: "\"The apparition of these faces in the crowd: / Petals on a wet, black bough. (\"\"In a Station of the Metro\"\" by Ezra Pound)\"", lesson: "Lesson VI" },
        { term: "Syllepsis", def: "The yoking of a verb to more than one subject with a different meaning implied in reference to each subject.", example: "Yet time and her aunt moved slowly—and her patience and her ideas were nearly worn out before the tete-a-tete was over. ( Pride and Prejudice  by Jane Austen)", lesson: "Lesson V" },
        { term: "Symploce", def: "Repetition at the beginning and the end.", example: "\"Facts alone are wanted in life ... This is the principle on which I bring up my own children, and this is the principle on which I bring up these children. ( Hard Times  by Charles Dickens)\"", lesson: "Lesson XV" },
        { term: "Syncope", def: "The subtraction of letters from the middle of a word in an intentional misspelling.", example: "\"A wretched ragged man, o'ergrown with hair, / Lay sleeping on his back. ( As You Like It , Act IV, Scene III, by Shakespeare)\"", lesson: "Lesson IV" },
        { term: "Synecdoche", def: "The substitution of a part for a whole.", example: "\"Ten thousand eyes were on him as he rubbed his hands with dirt; / Five thousand tongues applauded when he wiped them on his shirt. (\"\"Casey at the Bat\"\" by Ernest Lawrence Thayer)\"", lesson: "Lesson X" },
        { term: "Tmesis", def: "Breaking a word in two, sometimes to put another word in the spot.", example: "\"This is not Romeo, he's some other where. ( Romeo and Juliet , Act I, Scene I, by Shakespeare)\"", lesson: "Lesson VII" },
        { term: "Zeugma", def: "The yoking of a verb to more than one subject while grammatically it strictly refers to only one of them.", example: "\"The aim of a ship's captain is a successful voyage; a doctor's, health; a general's, victory. ( The Republic  by Cicero)\"", lesson: "Lesson V" }
    ];

    let studyDeck = []; // The randomized deck used for studying
    let currentIndex = 0;
    let currentIsTermToDef = true; 
    let wordStats = {}; 
    let currentTab = 'learn';
    let lastWrongAnswer = "";

    const cacheKey = 'rhetoric_flashcard_progress_v9'; // Bumped cache key

    // DOM Elements
    const cardFrontText = document.getElementById('card-front-text');
    const cardBackText = document.getElementById('card-back-text');
    const cardFrontLesson = document.getElementById('card-front-lesson');
    const cardBackLesson = document.getElementById('card-back-lesson');
    const flashcard = document.getElementById('flashcard');
    const cardContainer = document.getElementById('card-container');
    const dirSelect = document.getElementById('direction-select');
    
    const learnControls = document.getElementById('learn-controls');
    const testControls = document.getElementById('test-controls');
    const testInput = document.getElementById('test-input');
    const testFeedback = document.getElementById('test-feedback');
    const testHint = document.getElementById('test-hint');
    
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const masteryText = document.getElementById('mastery-text');
    const badges = document.querySelectorAll('.mastery-badge');
    const cardFrontStats = document.getElementById('card-front-stats');
    const cardBackStats = document.getElementById('card-back-stats');
    const flipHint = document.getElementById('flip-hint');

    const cardView = document.getElementById('card-view');
    const statsView = document.getElementById('stats-view');
    const listView = document.getElementById('list-view');
    const historyTableBody = document.getElementById('history-table-body');

    const tabLearn = document.getElementById('tab-learn');
    const tabTest = document.getElementById('tab-test');
    const tabStats = document.getElementById('tab-stats');
    const tabList = document.getElementById('tab-list');

    function init() {
        loadProgress();
        if (studyDeck.length === 0) {
            shuffleDeck();
        }
        setCardDirection();
        switchTab(currentTab);
    }

    function shuffleDeck() {
        studyDeck = [...flashcards];
        for (let i = studyDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [studyDeck[i], studyDeck[j]] = [studyDeck[j], studyDeck[i]];
        }
        currentIndex = 0;
    }

    function saveProgress() {
        const state = {
            index: currentIndex,
            tab: currentTab,
            direction: dirSelect.value,
            stats: wordStats,
            deckOrder: studyDeck.map(c => c.term)
        };
        localStorage.setItem(cacheKey, JSON.stringify(state));
    }

    function loadProgress() {
        const saved = localStorage.getItem(cacheKey);
        if (saved) {
            const state = JSON.parse(saved);
            currentIndex = state.index || 0;
            currentTab = state.tab || 'learn';
            dirSelect.value = state.direction || 'mixed';
            wordStats = state.stats || {};
            
            if (state.deckOrder) {
                studyDeck = state.deckOrder.map(term => flashcards.find(c => c.term === term)).filter(Boolean);
                if (studyDeck.length !== flashcards.length) shuffleDeck();
            }
        }
    }

    // --- Export & Import ---
    function exportData() {
        const data = localStorage.getItem(cacheKey);
        if (!data || Object.keys(wordStats).length === 0) {
            alert("No significant data to export yet!");
            return;
        }
        
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        const date = new Date().toISOString().split('T')[0];
        a.download = `rhetoric_backup_${date}.json`;
        document.body.appendChild(a);
        a.click();
        
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function triggerImport() {
        document.getElementById('file-import').click();
    }

    function handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData && importedData.stats) {
                    localStorage.setItem(cacheKey, JSON.stringify(importedData));
                    alert("Data imported successfully!");
                    init();
                    if (currentTab === 'stats') populateHistoryTable();
                } else {
                    alert("Invalid backup file structure.");
                }
            } catch (err) {
                alert("Error reading file. Ensure it is a valid JSON backup.");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function resetSession() {
        shuffleDeck();
        setCardDirection();
        resetTestUI();
        updateUI();
        saveProgress();
        alert("Deck reshuffled and restarted from the beginning!");
    }

    function wipeData() {
        if(confirm("Are you sure you want to delete all your progress and history data?")) {
            localStorage.removeItem(cacheKey);
            currentIndex = 0;
            wordStats = {};
            shuffleDeck();
            setCardDirection();
            resetTestUI();
            updateUI();
            if (currentTab === 'stats') populateHistoryTable();
        }
    }

    // --- Tab Management ---
    function switchTab(tabId) {
        currentTab = tabId;
        
        tabLearn.classList.remove('active');
        tabTest.classList.remove('active');
        tabStats.classList.remove('active');
        tabList.classList.remove('active');

        cardView.style.display = 'none';
        statsView.style.display = 'none';
        listView.style.display = 'none';
        learnControls.style.display = 'none';
        testControls.style.display = 'none';

        if (tabId === 'learn') {
            tabLearn.classList.add('active');
            cardView.style.display = 'flex';
            learnControls.style.display = 'flex';
            cardContainer.style.pointerEvents = 'auto'; 
            flipHint.style.display = 'block';
        } else if (tabId === 'test') {
            tabTest.classList.add('active');
            cardView.style.display = 'flex';
            testControls.style.display = 'block';
            cardContainer.style.pointerEvents = 'none'; 
            flipHint.style.display = 'none';
            resetTestUI();
        } else if (tabId === 'stats') {
            tabStats.classList.add('active');
            statsView.style.display = 'block';
            populateHistoryTable();
        } else if (tabId === 'list') {
            tabList.classList.add('active');
            listView.style.display = 'flex';
            populateListView();
        }

        saveProgress();
        if(tabId === 'learn' || tabId === 'test') updateUI();
    }

    function setCardDirection() {
        if (dirSelect.value === 'mixed') {
            currentIsTermToDef = Math.random() > 0.5; 
        } else {
            currentIsTermToDef = (dirSelect.value === 'term-def');
        }
    }

    function ensureStats(term) {
        if (!wordStats[term]) {
            wordStats[term] = { learn: { correct: 0, wrong: 0 }, test: { correct: 0, wrong: 0 } };
        }
    }

    function renderCardStats(term) {
        ensureStats(term);
        const stats = wordStats[term];
        const statHTML = `
            <div><span class="stat-label">Learn:</span> <span class="stat-c">${stats.learn.correct}</span> &nbsp;|&nbsp; <span class="stat-w">${stats.learn.wrong}</span></div>
            <div><span class="stat-label">Test:</span> <span class="stat-c">${stats.test.correct}</span> &nbsp;|&nbsp; <span class="stat-w">${stats.test.wrong}</span></div>
        `;
        cardFrontStats.innerHTML = statHTML;
        cardBackStats.innerHTML = statHTML;
    }

    function updateUI() {
        flashcard.classList.remove('is-flipped');
        const card = studyDeck[currentIndex];
        
        cardFrontLesson.textContent = card.lesson;
        cardBackLesson.textContent = card.lesson;
        
        cardFrontText.textContent = currentIsTermToDef ? card.term : card.def;
        cardBackText.textContent = currentIsTermToDef ? card.def : card.term;

        renderCardStats(card.term);

        const isMastered = (wordStats[card.term].learn.correct + wordStats[card.term].test.correct) > 0;
        badges.forEach(badge => badge.style.display = isMastered ? 'block' : 'none');

        const percent = ((currentIndex + 1) / studyDeck.length) * 100;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `Card ${currentIndex + 1} of ${studyDeck.length}`;
        
        let masteredCount = 0;
        for (const term in wordStats) {
            ensureStats(term);
            if ((wordStats[term].learn.correct + wordStats[term].test.correct) > 0) masteredCount++;
        }
        masteryText.innerHTML = `Mastered: <span class="stats-highlight">${masteredCount}</span> / ${studyDeck.length}`;

        saveProgress();
    }

    function flipCard() {
        if (currentTab === 'learn') {
            flashcard.classList.toggle('is-flipped');
        }
    }

    function nextCard() {
        if (currentIndex < studyDeck.length - 1) {
            currentIndex++;
            setCardDirection(); 
            resetTestUI();
            updateUI();
        } else {
            alert("You have reached the end of the deck! Reshuffling and restarting...");
            resetSession(); 
        }
    }

    function changeDirection() { 
        setCardDirection(); 
        updateUI(); 
    }

    // --- Learn Mode Controls ---
    function markCorrect() {
        const term = studyDeck[currentIndex].term;
        ensureStats(term);
        wordStats[term].learn.correct++;
        saveProgress();
        nextCard();
    }

    function markWrong() {
        const term = studyDeck[currentIndex].term;
        ensureStats(term);
        wordStats[term].learn.wrong++;
        saveProgress();
        nextCard();
    }

    function skipCard() {
        nextCard();
    }

    // --- Test Mode Controls ---
    function resetTestUI() {
        testInput.value = '';
        testFeedback.textContent = '';
        testHint.textContent = '';
        lastWrongAnswer = "";
        
        testInput.disabled = false;
        document.getElementById('btn-hint').disabled = false;
        document.getElementById('btn-submit').disabled = false;
        document.getElementById('btn-giveup').disabled = false;
        
        if(currentTab === 'test') {
            setTimeout(() => testInput.focus(), 50);
        }
    }

    function disableTestButtons() {
        testInput.disabled = true;
        document.getElementById('btn-hint').disabled = true;
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-giveup').disabled = true;
    }

    function showHint() {
        const card = studyDeck[currentIndex];
        const correctAnswer = currentIsTermToDef ? card.def : card.term;
        let hintStr = "";
        
        if (correctAnswer.length > 25) {
            const words = correctAnswer.split(" ");
            hintStr = words[0] + " " + words[1] + " ... (" + words.length + " words total)";
        } else {
            hintStr = correctAnswer.substring(0, 2) + "..." + " (" + correctAnswer.length + " letters)";
        }
        
        testHint.textContent = `Hint: ${hintStr}`;
        testInput.focus();
    }

    function giveUp() {
        const card = studyDeck[currentIndex];
        const correctAnswer = currentIsTermToDef ? card.def : card.term;
        
        testFeedback.style.color = '#ffb2b2';
        testFeedback.textContent = `The answer was: ${correctAnswer}`;
        
        ensureStats(card.term);
        wordStats[card.term].test.wrong++;
        saveProgress();
        renderCardStats(card.term);

        flashcard.classList.add('is-flipped');
        disableTestButtons();

        setTimeout(() => {
            nextCard();
        }, 3500);
    }

    function handleEnter(e) {
        if (e.key === 'Enter') checkAnswer();
    }

    function getEditDistance(a, b) {
        if(a.length === 0) return b.length; 
        if(b.length === 0) return a.length; 
        let matrix = [];
        for(let i = 0; i <= b.length; i++) matrix[i] = [i];
        for(let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for(let i = 1; i <= b.length; i++) {
            for(let j = 1; j <= a.length; j++) {
                if(b.charAt(i-1) === a.charAt(j-1)){
                    matrix[i][j] = matrix[i-1][j-1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i-1][j-1] + 1, 
                        Math.min(matrix[i][j-1] + 1, 
                        matrix[i-1][j] + 1) 
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    function checkAnswer() {
        const card = studyDeck[currentIndex];
        const correctAnswer = currentIsTermToDef ? card.def : card.term;
        const userAnswer = testInput.value.trim().toLowerCase();
        
        if (userAnswer === "") {
            testFeedback.style.color = '#ffd166';
            testFeedback.textContent = "Please type an answer before submitting.";
            return;
        }

        if (userAnswer === lastWrongAnswer) {
            testFeedback.style.color = '#ffd166';
            testFeedback.textContent = "You just tried that! Guess something else or use a hint.";
            return;
        }

        const cleanCorrect = correctAnswer.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        const cleanUser = userAnswer.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

        ensureStats(card.term);

        const dist = getEditDistance(cleanUser, cleanCorrect);
        const allowedErrors = Math.max(1, Math.floor(cleanCorrect.length / 6)); 
        
        let isCorrect = false;
        let typoAlert = false;

        if (cleanUser === cleanCorrect) {
            isCorrect = true;
        } else if (dist <= allowedErrors) {
            isCorrect = true;
            typoAlert = true;
        } else if (cleanCorrect.includes(cleanUser) && cleanUser.length > 4) {
            isCorrect = true;
        }

        if (isCorrect) {
            testFeedback.style.color = '#a8ffb2';
            if (typoAlert) {
                testFeedback.textContent = `Correct! (Typo allowed. Exact answer: ${correctAnswer})`;
            } else {
                testFeedback.textContent = "Correct!";
            }
            
            wordStats[card.term].test.correct++;
            saveProgress();
            renderCardStats(card.term);

            flashcard.classList.add('is-flipped');
            disableTestButtons();

            setTimeout(() => {
                nextCard();
            }, 2500);
        } else {
            testFeedback.style.color = '#ffb2b2';
            testFeedback.textContent = `Incorrect. Try again, ask for a hint, or Give Up.`;
            
            lastWrongAnswer = userAnswer;
            wordStats[card.term].test.wrong++;
            saveProgress();
            renderCardStats(card.term);
            
            testInput.value = '';
            testInput.focus();
        }
    }

    // --- Statistics Rendering ---
    function populateHistoryTable() {
        historyTableBody.innerHTML = '';
        flashcards.forEach(card => {
            ensureStats(card.term);
            const stats = wordStats[card.term];
            
            const totalAttempts = stats.learn.correct + stats.learn.wrong + stats.test.correct + stats.test.wrong;
            const totalCorrect = stats.learn.correct + stats.test.correct;
            
            let accuracy = "0%";
            if (totalAttempts > 0) {
                accuracy = Math.round((totalCorrect / totalAttempts) * 100) + "%";
            } else {
                accuracy = "-";
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${card.term}</strong> <span style="font-size: 11px; color: #ffd166;">(${card.lesson})</span></td>
                <td class="correct-col table-section-border">${stats.learn.correct}</td>
                <td class="wrong-col">${stats.learn.wrong}</td>
                <td class="correct-col table-section-border">${stats.test.correct}</td>
                <td class="wrong-col">${stats.test.wrong}</td>
                <td class="table-section-border" style="text-align: center;">${accuracy}</td>
            `;
            historyTableBody.appendChild(tr);
        });
    }

    // --- List View Rendering ---
    function populateListView() {
        listView.innerHTML = '';
        flashcards.forEach(card => {
            const el = document.createElement('div');
            el.className = 'list-card';
            el.innerHTML = `
                <div class="list-term">${card.term} <span class="list-lesson">(${card.lesson})</span></div>
                <div class="list-def">${card.def}</div>
                <div class="list-ex"><strong>Example:</strong> ${card.example}</div>
            `;
            listView.appendChild(el);
        });
    }

    init();
</script>
</body>
</html>
