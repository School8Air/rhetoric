<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhetoric Flashcards</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls select, .controls button {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
            transition: background 0.3s ease;
        }

        .controls select option {
            background: #2b2b2b;
            color: white;
        }

        .controls select:hover, .controls button:hover {
            background: rgba(0, 0, 0, 0.4);
        }
        
        .btn-danger {
            background: rgba(255, 50, 50, 0.2) !important;
        }
        .btn-danger:hover {
            background: rgba(255, 50, 50, 0.4) !important;
        }

        /* Tabs System */
        .tabs {
            display: flex;
            width: 100%;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease, font-weight 0.3s ease;
        }

        .tab.active {
            background: rgba(255,255,255,0.25);
            font-weight: bold;
            box-shadow: inset 0 -3px 0 rgba(255,255,255,0.5);
        }

        .tab:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }

        /* Views */
        #card-view {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #stats-view {
            display: none;
            flex-direction: column;
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        /* Scrollbar styling for history */
        #stats-view::-webkit-scrollbar {
            width: 8px;
        }
        #stats-view::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1); 
            border-radius: 4px;
        }
        #stats-view::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3); 
            border-radius: 4px;
        }

        /* History Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
        }
        th {
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .correct-col { color: #a8ffb2; text-align: center; }
        .wrong-col { color: #ffb2b2; text-align: center; }

        /* Card Flip Animation */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 250px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            font-size: 24px;
            line-height: 1.4;
        }

        .card-back {
            transform: rotateY(180deg);
            font-size: 18px;
        }

        .mastery-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            background: rgba(46, 204, 113, 0.4);
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid rgba(46, 204, 113, 0.6);
            display: none;
        }

        .card-history-stats {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
        }

        .stat-c { color: #a8ffb2; }
        .stat-w { color: #ffb2b2; }

        /* Test Mode UI */
        #test-controls {
            display: none;
            width: 100%;
        }

        #test-input {
            width: calc(100% - 30px);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        #test-feedback {
            font-weight: bold;
            height: 20px;
            margin-bottom: 15px;
        }

        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: rgba(255,255,255,0.8);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.8);
        }

        .stats-highlight {
            color: #a8ffb2;
            font-weight: bold;
        }

        #learn-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        #learn-controls button {
            flex: 1;
            margin: 0 5px;
            padding: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <header>
            <h2 style="margin: 0; font-size: 22px;">Rhetoric Review</h2>
            <div class="controls">
                <select id="direction-select" onchange="changeDirection()">
                    <option value="mixed" selected>Mixed (Auto)</option>
                    <option value="term-def">Term → Def</option>
                    <option value="def-term">Def → Term</option>
                </select>
                <button onclick="resetSession()">Restart</button>
                <button class="btn-danger" onclick="wipeData()">Wipe Data</button>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" id="tab-learn" onclick="switchTab('learn')">Learn</div>
            <div class="tab" id="tab-test" onclick="switchTab('test')">Test</div>
            <div class="tab" id="tab-stats" onclick="switchTab('stats')">Statistics</div>
        </div>

        <div id="card-view">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="stats-row">
                <span id="progress-text">Card 1 of X</span>
                <span id="mastery-text">Mastered: <span class="stats-highlight">0</span></span>
            </div>

            <div class="card-container" id="card-container" onclick="flipCard()">
                <div class="card" id="flashcard">
                    <div class="card-face card-front">
                        <div class="mastery-badge">⭐ Mastered</div>
                        <span id="card-front-text" style="width: 100%; text-align: center;">Front</span>
                        <div class="card-history-stats" id="card-front-stats">
                            <span class="stat-c">Correct: 0</span> | <span class="stat-w">Wrong: 0</span>
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <div class="mastery-badge">⭐ Mastered</div>
                        <span id="card-back-text" style="width: 100%; text-align: center;">Back</span>
                        <div class="card-history-stats" id="card-back-stats">
                            <span class="stat-c">Correct: 0</span> | <span class="stat-w">Wrong: 0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="test-controls">
                <input type="text" id="test-input" placeholder="Type your answer here..." onkeypress="handleEnter(event)">
                <div id="test-feedback"></div>
                <button class="controls button" onclick="checkAnswer()" style="width: 100%; padding: 15px;">Submit Answer</button>
            </div>

            <div id="learn-controls">
                <button class="controls button" onclick="prevCard()">Previous</button>
                <button class="controls button" onclick="nextCard()">Next</button>
            </div>
        </div>

        <div id="stats-view">
            <table>
                <thead>
                    <tr>
                        <th>Term</th>
                        <th class="correct-col">Correct</th>
                        <th class="wrong-col">Wrong</th>
                        <th>Accuracy</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    const flashcards = [
        { term: "Absolute ellipsis", def: "A phrase or sentence in which the omitted material is not betrayed by the words which remain." },
        { term: "Anadiplosis", def: "Repetition of an end at the next beginning." },
        { term: "Anaphora", def: "Repetition at the beginning." },
        { term: "Anapodoton", def: "The omission of one or more whole clauses which are not logically implied by the remaining text." },
        { term: "Anastrophe", def: "The reversal of word order." },
        { term: "Antanaclasis", def: "Repetition in different senses." },
        { term: "Anthimeria", def: "The substitution of one part of speech for another." },
        { term: "Antiptosis", def: "The substitution of a prepositional phrase for an adjective." },
        { term: "Antisthecon", def: "The substitution of one or more letters in a word in an intentional misspelling." },
        { term: "Antithesis", def: "The repetition of ideas by negation." },
        { term: "Aphaeresis", def: "The subtraction of letters from the beginning of a word in an intentional misspelling." },
        { term: "Apocope", def: "Subtraction of letters from the end of a word in an intentional misspelling." },
        { term: "Aporia", def: "To talk about not being able to talk about something." },
        { term: "Aposiopesis", def: "The intentional omission of the last part of a sentence or the last part of a thought." },
        { term: "Asterismos", def: "The addition of a word to emphasize what follows." },
        { term: "Asyndeton", def: "An omission of a conjunction." },
        { term: "Auxesis", def: "Arrangement in ascending order." },
        { term: "Catachresis", def: "An apparently inappropriate substitution of one word for another." },
        { term: "Chiasmus", def: "Epanodos at the level of the passage." },
        { term: "Congeries", def: "Repetition using other words." },
        { term: "Diacope", def: "Repetition with only a word or two between." },
        { term: "Ellipsis", def: "The general name for the omission of one or more words." },
        { term: "Enallage", def: "An exchange of words or a substitution of one for another." },
        { term: "Enthymeme", def: "An abbreviation of a syllogism, where one or more of the premises is missing." },
        { term: "Epanalepsis", def: "Repetition of the beginning at the end." },
        { term: "Epanodos", def: "Repetition in reverse order." },
        { term: "Epanorthosis", def: "Addition by correction." },
        { term: "Epenthesis", def: "The addition of letters in the middle of the word in a purposeful misspelling." },
        { term: "Epistrophe", def: "Repetition at the end." },
        { term: "Epizeuxis", def: "Immediate repetition." },
        { term: "Gradatio", def: "Repeated repetition of an end at the next beginning." },
        { term: "Hendiadys", def: "Two or more words used, but one meaning intended." },
        { term: "Hypallage", def: "A reversal which seems to change the sense of a sentence." },
        { term: "Hyperbaton", def: "The deviation from ordinary word order." },
        { term: "Hysteron-proteron", def: "The reversal of temporal order in a sentence." },
        { term: "Inclusio", def: "Repetition of the beginning." },
        { term: "Isocolon", def: "The repetition of grammatical forms." },
        { term: "Metalepsis", def: "The double substitution of a word for a related word." },
        { term: "Metaplasmus", def: "A purposeful misspelling." },
        { term: "Metathesis", def: "The rearrangement of one or more letters in a word in an intentional misspelling." },
        { term: "Metonymy", def: "The substitution of one word for another related word." },
        { term: "Paradiastole", def: "The repetition of the disjunctives, 'neither' and 'nor' or 'either' and 'or'." },
        { term: "Parenthesis", def: "Parenthetical addition by way of explanation." },
        { term: "Periphrasis", def: "The substitution of more for fewer words." },
        { term: "Pleonasm", def: "The addition of superfluous words." },
        { term: "Ploce", def: "Repetition in a general and restricted sense." },
        { term: "Polyptoton", def: "The repetition of the same word or root in different grammatical forms." },
        { term: "Polysyndeton", def: "The repetition of the word 'and' at the beginning of successive phrases." },
        { term: "Praecisio", def: "Simple silence." },
        { term: "Proparalepsis", def: "The addition of letters to the end of a word in a purposeful misspelling." },
        { term: "Prosthesis", def: "The addition of letters at the beginning of a word in a purposeful misspelling." },
        { term: "Repetitio", def: "Irregular repetition of a word or phrase." },
        { term: "Scesis onomaton", def: "The intentional omission of a verb." },
        { term: "Syllepsis", def: "The yoking of a verb to more than one subject with a different meaning implied in reference to each subject." },
        { term: "Symploce", def: "Repetition at the beginning and the end." },
        { term: "Syncope", def: "The subtraction of letters from the middle of a word in an intentional misspelling." },
        { term: "Synecdoche", def: "The substitution of a part for a whole." },
        { term: "Tmesis", def: "Breaking a word in two, sometimes to put another word in the spot." },
        { term: "Zeugma", def: "The yoking of a verb to more than one subject while grammatically it strictly refers to only one of them." }
    ];

    let currentIndex = 0;
    let currentIsTermToDef = true; 
    let wordStats = {}; 
    let currentTab = 'learn';

    const cacheKey = 'rhetoric_flashcard_progress_v3';

    // DOM Elements
    const cardFrontText = document.getElementById('card-front-text');
    const cardBackText = document.getElementById('card-back-text');
    const flashcard = document.getElementById('flashcard');
    const cardContainer = document.getElementById('card-container');
    const dirSelect = document.getElementById('direction-select');
    
    const learnControls = document.getElementById('learn-controls');
    const testControls = document.getElementById('test-controls');
    const testInput = document.getElementById('test-input');
    const testFeedback = document.getElementById('test-feedback');
    
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const masteryText = document.getElementById('mastery-text');
    const badges = document.querySelectorAll('.mastery-badge');
    const cardFrontStats = document.getElementById('card-front-stats');
    const cardBackStats = document.getElementById('card-back-stats');

    const cardView = document.getElementById('card-view');
    const statsView = document.getElementById('stats-view');
    const historyTableBody = document.getElementById('history-table-body');

    // Tab Elements
    const tabLearn = document.getElementById('tab-learn');
    const tabTest = document.getElementById('tab-test');
    const tabStats = document.getElementById('tab-stats');

    function init() {
        loadProgress();
        setCardDirection();
        switchTab(currentTab); // This will call updateUI
    }

    function saveProgress() {
        const state = {
            index: currentIndex,
            tab: currentTab,
            direction: dirSelect.value,
            stats: wordStats
        };
        localStorage.setItem(cacheKey, JSON.stringify(state));
    }

    function loadProgress() {
        const saved = localStorage.getItem(cacheKey);
        if (saved) {
            const state = JSON.parse(saved);
            currentIndex = state.index || 0;
            currentTab = state.tab || 'learn';
            dirSelect.value = state.direction || 'mixed';
            wordStats = state.stats || {};
        }
    }

    function resetSession() {
        currentIndex = 0;
        setCardDirection();
        updateUI();
        testFeedback.textContent = "";
        testInput.value = "";
        saveProgress();
    }

    function wipeData() {
        if(confirm("Are you sure you want to delete all your progress and history data?")) {
            localStorage.removeItem(cacheKey);
            currentIndex = 0;
            wordStats = {};
            setCardDirection();
            updateUI();
            testFeedback.textContent = "";
            testInput.value = "";
            if (currentTab === 'stats') populateHistoryTable();
        }
    }

    function switchTab(tabId) {
        currentTab = tabId;
        
        // Remove active class from all
        tabLearn.classList.remove('active');
        tabTest.classList.remove('active');
        tabStats.classList.remove('active');

        // Hide all views
        cardView.style.display = 'none';
        statsView.style.display = 'none';
        learnControls.style.display = 'none';
        testControls.style.display = 'none';

        if (tabId === 'learn') {
            tabLearn.classList.add('active');
            cardView.style.display = 'flex';
            learnControls.style.display = 'flex';
            cardContainer.style.pointerEvents = 'auto'; // allow flipping
        } else if (tabId === 'test') {
            tabTest.classList.add('active');
            cardView.style.display = 'flex';
            testControls.style.display = 'block';
            cardContainer.style.pointerEvents = 'none'; // disable flipping
            testInput.value = '';
            testFeedback.textContent = '';
            setTimeout(() => testInput.focus(), 50);
        } else if (tabId === 'stats') {
            tabStats.classList.add('active');
            statsView.style.display = 'block';
            populateHistoryTable();
        }

        saveProgress();
        if(tabId !== 'stats') updateUI();
    }

    function setCardDirection() {
        if (dirSelect.value === 'mixed') {
            currentIsTermToDef = Math.random() > 0.5; 
        } else {
            currentIsTermToDef = (dirSelect.value === 'term-def');
        }
    }

    function updateUI() {
        flashcard.classList.remove('is-flipped');
        const card = flashcards[currentIndex];
        
        cardFrontText.textContent = currentIsTermToDef ? card.term : card.def;
        cardBackText.textContent = currentIsTermToDef ? card.def : card.term;

        // Fetch stats for current card
        const stats = wordStats[card.term] || { correct: 0, wrong: 0 };
        const statHTML = `<span class="stat-c">Correct: ${stats.correct}</span> | <span class="stat-w">Wrong: ${stats.wrong}</span>`;
        cardFrontStats.innerHTML = statHTML;
        cardBackStats.innerHTML = statHTML;

        const isMastered = stats.correct > 0;
        badges.forEach(badge => {
            badge.style.display = isMastered ? 'block' : 'none';
        });

        // Update Progress
        const percent = ((currentIndex + 1) / flashcards.length) * 100;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `Card ${currentIndex + 1} of ${flashcards.length}`;
        
        let masteredCount = 0;
        for (const term in wordStats) {
            if (wordStats[term].correct > 0) masteredCount++;
        }
        masteryText.innerHTML = `Mastered: <span class="stats-highlight">${masteredCount}</span> / ${flashcards.length}`;

        saveProgress();
    }

    function flipCard() {
        if (currentTab === 'learn') {
            flashcard.classList.toggle('is-flipped');
        }
    }

    function nextCard() {
        if (currentIndex < flashcards.length - 1) {
            currentIndex++;
            setCardDirection(); 
            updateUI();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            setCardDirection(); 
            updateUI();
        }
    }

    function changeDirection() { 
        setCardDirection(); 
        updateUI(); 
    }

    function handleEnter(e) {
        if (e.key === 'Enter') checkAnswer();
    }

    function checkAnswer() {
        const card = flashcards[currentIndex];
        const correctAnswer = currentIsTermToDef ? card.def : card.term;
        const userAnswer = testInput.value.trim().toLowerCase();
        
        const cleanCorrect = correctAnswer.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        const cleanUser = userAnswer.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

        if (!wordStats[card.term]) wordStats[card.term] = { correct: 0, wrong: 0 };

        if (cleanUser === cleanCorrect || (cleanCorrect.includes(cleanUser) && cleanUser.length > 4)) {
            testFeedback.style.color = '#a8ffb2';
            testFeedback.textContent = "Correct!";
            wordStats[card.term].correct++;
            flashcard.classList.add('is-flipped');
            setTimeout(() => {
                nextCard();
                testInput.value = '';
                testFeedback.textContent = '';
                testInput.focus();
            }, 1500);
        } else {
            testFeedback.style.color = '#ffb2b2';
            testFeedback.textContent = `Incorrect. The answer is: ${correctAnswer}`;
            wordStats[card.term].wrong++;
            flashcard.classList.add('is-flipped');
        }
        
        saveProgress();
        const statHTML = `<span class="stat-c">Correct: ${wordStats[card.term].correct}</span> | <span class="stat-w">Wrong: ${wordStats[card.term].wrong}</span>`;
        cardFrontStats.innerHTML = statHTML;
        cardBackStats.innerHTML = statHTML;
    }

    function populateHistoryTable() {
        historyTableBody.innerHTML = '';
        flashcards.forEach(card => {
            const stats = wordStats[card.term] || { correct: 0, wrong: 0 };
            const total = stats.correct + stats.wrong;
            let accuracy = "0%";
            if (total > 0) {
                accuracy = Math.round((stats.correct / total) * 100) + "%";
            } else {
                accuracy = "-";
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${card.term}</strong></td>
                <td class="correct-col">${stats.correct}</td>
                <td class="wrong-col">${stats.wrong}</td>
                <td style="text-align: center;">${accuracy}</td>
            `;
            historyTableBody.appendChild(tr);
        });
    }

    init();
</script>
</body>
</html>
